# Config de base — héritée par tous les scénarios. Surcharge par les fichiers spécifiques.
project: forensic-synth
seed: 42
seeds: [42, 1234, 2025]        # multi-seed (recette B1)

# --- Scénario (surchargé) ---
modality: visible               # visible | ir
distance: d1                    # d1 (4.20m) | d2 (2.60m) | d3 (1.00m)

# --- Chemins (résolus par src/utils/paths.py) ---
# drive_root = racine unique de TOUS les artefacts (data SCface, checkpoints, outputs).
# Valeur par défaut = chemin Drive (Colab). En local, NE PAS éditer ce fichier :
# définir la variable d'environnement FORENSIC_SYNTH_ROOT (cf. src/config.py),
# c'est le seul changement nécessaire pour changer d'environnement.
paths:
  drive_root: /content/drive/MyDrive/forensic_synth
  scface_root: ${paths.drive_root}/data/SCface_database
  # blocks.json est VERSIONNÉ DANS LE DÉPÔT (pas une donnée utilisateur) : chemin
  # relatif au dossier de travail (= racine du repo, cf. CODE_DIR du notebook), PAS
  # sous drive_root. Erreur déjà rencontrée : sur un nouveau compte Drive sans copie
  # orpheline de ce fichier, le chemin ${drive_root}/data/blocks.json n'existe nulle part.
  blocks_file: data/blocks.json   # partition A/B/C figée
  outputs: ${paths.drive_root}/outputs
  checkpoints: ${paths.drive_root}/checkpoints
  synth_dataset: ${paths.outputs}/synth/${modality}_${distance}
  # Assets pré-entraînés déposés manuellement (cf. generator.pretrained.* ci-dessous) :
  #   pretrained/arcface/arcface_ms1mv3_r50.pth, pretrained/encoder/, pretrained/arc2face/,
  #   pretrained/antelopev2/ — partagés par generator/, fidelity/ et recognition/.
  pretrained_dir: ${paths.drive_root}/pretrained
  arcface_weights: ${paths.pretrained_dir}/arcface/arcface_ms1mv3_r50.pth
  arc2face_models_dir: ${paths.pretrained_dir}     # contient encoder/ et arc2face/ (sinon fallback HF Hub)
  insightface_models_dir: ${paths.pretrained_dir}  # contient antelopev2/ (sinon fallback auto insightface)
  # Cache persistant (Drive) des tenseurs déjà alignés (landmarks) : évite de
  # ré-exécuter la détection antelopev2 (CPU, ~1-2s/image) à chaque seed/condition/
  # évaluation pour une image déjà vue -- même principe que le cache .npy du code
  # de référence (Pré_alignement_et_mise_en_cache.ipynb), mais alimenté à la volée
  # (clé = chemin source) plutôt que pré-calculé en un étage séparé.
  aligned_cache: ${paths.drive_root}/aligned_cache

# --- Partition (anti-fuite) ---
partition:
  block_a_size: 50   # entraînement générateurs
  block_b_size: 50   # génération + validation fidélité
  # Bloc C = les identités restantes de blocks.json (30 id), jamais vu

# --- Générateur ---
generator:
  backbone: arc2face          # base gelée, identité = embedding ArcFace
  adapter: lora               # lora | full_finetune (full prévu pour l'IR)
  pretrained:
    base_sd: stable-diffusion-v1-5/stable-diffusion-v1-5   # HF Hub
    arc2face_repo: FoivosPar/Arc2Face                       # HF Hub (subfolders encoder/arc2face)
    insightface_pack: antelopev2                            # extraction embedding ID (conditionnement)
  lora:
    # Rang 16 + attention seule (to_q/to_k/to_v/to_out.0) n'a appris AUCUNE
    # degradation visible (teste avec degrade_prior=false ET identity_loss=0,
    # toujours net -- 2026-06-28/29). Hypothese : le flou/la perte de resolution
    # sont des transformations SPATIALES/texturales, portees par les blocs
    # convolutifs (ResNet) du UNet, pas par l'attention (qui gere surtout les
    # interactions token/conditionnement) -- l'attention seule est probablement
    # le mauvais point d'injection pour ce type de degradation, independamment
    # du rang. Rang monte a 32 ET conv1/conv2 (blocs ResNet) ajoutes aux couches
    # ciblees ; cout memoire reste negligeable (quelques M parametres) vs un
    # fine-tuning complet (~860M, hors de portee d'un T4 15 Go gratuit).
    rank: 32
    alpha: 32
    target_modules: [to_q, to_k, to_v, to_out.0, conv1, conv2]
    # rsLoRA (2026-06-29) : passer de rang 16 a 32 a AGGRAVE l'instabilite a
    # l'inference (cf. incident precedent) -- l'echelle classique alpha/r ne se
    # comporte pas bien a rang eleve (documente, Kalajdzievski 2023). Bascule sur
    # alpha/sqrt(r) (cf. base_arc2face.py::_setup_adapter, peft 0.7.1 n'a pas le
    # flag natif use_rslora -- reproduit manuellement via un lora_alpha pre-corrige).
    rs_lora: true
  # Mis a 0.0 (test, 2026-06-28) : meme avec degrade_prior=false, aucune trace de
  # degradation type CCTV n'apparait (toujours net, cf. comparaison
  # degradation_vs_real_001.png) -- hypothese : identity_loss (cosinus ArcFace,
  # qui recompense structurellement un visage NET, plus facile a reconnaitre)
  # est en tension directe avec diffusion_loss (qui demande de reproduire une
  # cible degradee/floue). Coupe temporairement pour verifier si une vraie
  # degradation emerge sans ce conflit -- la perte d'identite sera reevaluee
  # separement apres coup (cosinus synth vs reel, Bloc B).
  identity_loss_weight: 0.0   # poids cosinus ArcFace (normalement 0.5)
  # Desactive (2026-06-28) : appliquait une degradation SUPPLEMENTAIRE et agressive
  # (flou+resize+bruit+JPEG, EMPILEE 2x) sur la cible reelle d1 deja degradee par la
  # vraie camera -- decalage de distribution trop important pour une LoRA de faible
  # rang (rank=16) : a l'inference, aucune trace de degradation a basse intensite
  # (lora_scale<=0.6), seulement de l'instabilite/bruit a haute intensite (>=0.8),
  # jamais un etat ressemblant a une vraie capture SCface d1 (cf. comparaison directe
  # degradation_vs_real_001.png). Hypothese a verifier : la cible reelle d1 SEULE
  # (sans degradation synthetique ajoutee) est un signal plus modeste, plus a portee
  # d'une LoRA de ce rang.
  degrade_prior: false
  samples_per_identity: 20    # K : diversité intra-classe
  sample:                     # génération (stage 'generate', Arc2FaceGenerator.sample)
    num_inference_steps: 25
    # 3.0 = valeur recommandée par Arc2Face. Les artefacts néon/postérisés observés
    # le 2026-06-26 étaient IDENTIQUES à 1.0 et 3.0 -> CFG écarté comme cause (la
    # vraie cause était le VAE SD1.5 instable en float16, corrigé dans _ensure_loaded).
    guidance_scale: 3.0
    # Guidage actif par gradient ArcFace à CHAQUE pas de débruitage (inspiré d'ID³,
    # cf. discussion 2026-06-26) : 0.0 = désactivé (comportement standard). Agit
    # uniquement à l'inférence, aucun ré-entraînement requis pour tester une valeur.
    identity_guidance_strength: 0.0
    # A pleine intensite (1.0), la LoRA entrainee derive le std des latents
    # d'environ 1.0 a 1.7 sur les 25 pas de debruitage (verifie independamment du
    # solveur, DPMSolverMultistep ET DDIM) -> decodage VAE en bruit pur (incident
    # du 2026-06-28). Diviser par 2 (0.5) restaure un visage net sur le meme
    # checkpoint, sans necessiter de re-entrainement. A recalibrer par checkpoint.
    lora_scale: 0.5
  train:
    lr: 1.0e-4
    lr_scheduler: cosine      # constant -> cosine : decroit vers 0 plutot que rester
                              # plat sur toute la duree (hygiene manquante identifiee
                              # le 2026-06-27, cf. comparaison Arc2Avatar/litterature)
    lr_warmup_steps: 100
    max_grad_norm: 1.0        # ecretage REEL (diagnostic precedent : pas d'instabilite
                              # observee, mais absence de filet de securite standard)
    max_steps: 4000
    batch_size: 1             # OOM observé à 4 puis à nouveau à 2 (VAE passé en
                               # float32 -> ~2x plus gourmand) sur T4 15 Go ; VAE
                               # decode + ArcFace avec gradients, en plus du UNet,
                               # pour la perte d'identité
    ckpt_every: 200           # reprenable
    log_every: 50

# --- Garde-fou de fidélité (go/no-go) ---
fidelity:
  fid_max: 60.0               # seuil à calibrer
  cos_min: 0.45              # cosinus ArcFace min synth<->vrai (même id, Bloc B)
  run_pilot: true
  # Filtre PAR IMAGE (stage 'filter_synthetic', src/fidelity/filter.py), avant
  # train_recognition/fidelity -- distinct de cos_min (qui est une moyenne sur
  # tout le lot d'une identite). Retire le bruit pur (cf. avertissements "aucun
  # visage detecte"), mais ne garantit PAS une bonne degradation (un cosinus
  # eleve favorise les images nettes, pas forcement les mieux degradees).
  filter_cos_min: 0.45

# --- Reconnaissance (recette B1, alignée sur old_code_paper_classB le 2026-06-27) ---
recognition:
  backbone: iresnet50
  pretrained: arcface_ms1mv3
  scope: layer3_4            # dégèle layer3+layer4+bn2+fc ; 'features' TOUJOURS gelée
                              # (BatchNorm1d finale, design arcface_torch, confirmé
                              # dans le code de référence pour full_ft/ft_34/ft_4)
  optimizer: adamw
  lr: 1.0e-4
  weight_decay: 0.1
  warmup_epochs: 2           # warmup linéaire puis cosine (cf. get_lr du code de référence)
  hflip_prob: 0.5            # augmentation flip horizontal (cf. CachedDataset de référence)
  epochs: 20
  batch_size: 32
  ckpt_every: 200            # reprenable
  log_every: 50
  anchor_ratio: 0.5          # 50/50 mugshot/surveillance
  conditions: [real, synthetic, mixed]
  synthetic_ratio: 1.0       # ablation 'mixed' uniquement : 100% du réel + cette
                             # fraction du volume synthétique disponible par identité
                             # (1.0=tout, 0.0=équivaut à 'real', valeurs intermédiaires
                             # pour trouver le volume optimal de données synthétiques)
  arcmargin:                 # tête ArcFace (cosine softmax à marge) pour l'entraînement
    scale: 64.0
    margin: 0.5

# --- Évaluation ---
eval:
  metric: rank1
  terrains: [["visible","d1"]]   # surchargé par scénario ; visible -> d1 SEULEMENT
